<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="동화 극장" />
  <meta name="theme-color" content="#000000" />
  <title>세담이의 동화 극장</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <style>
    :root {
      --bg: #000;
      --surface: rgba(255, 255, 255, 0.08);
      --surface-strong: rgba(255, 255, 255, 0.14);
      --hairline: rgba(255, 255, 255, 0.12);
      --text: rgba(255, 255, 255, 0.96);
      --text-2: rgba(255, 255, 255, 0.62);
      --text-3: rgba(255, 255, 255, 0.38);
      --accent: #0A84FF;
      --accent-pink: #FF375F;
      --ease: cubic-bezier(0.32, 0.72, 0, 1);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, "Apple SD Gothic Neo", "Pretendard", sans-serif;
      background: #000;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.015em;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    button {
      font-family: inherit;
      color: inherit;
      border: 0;
      background: transparent;
      cursor: pointer;
      transition: transform 0.18s var(--ease), background 0.25s var(--ease), opacity 0.25s var(--ease);
    }
    button:active:not(:disabled) { transform: scale(0.94); }
    button:disabled { opacity: 0.35; cursor: default; }

    .glass {
      background: var(--surface);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 0.5px solid var(--hairline);
    }

    /* === Background blur (album-art halo) === */
    .bg-blur {
      position: fixed;
      inset: -15%;
      background-size: cover;
      background-position: center;
      filter: blur(80px) brightness(0.45) saturate(1.6);
      transform: scale(1.3);
      transition: background-image 1.2s var(--ease), opacity 1s var(--ease);
      z-index: -2;
      opacity: 0;
    }
    .bg-blur.visible { opacity: 1; }
    .bg-vignette {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at top, rgba(20, 20, 30, 0.0) 0%, rgba(0, 0, 0, 0.55) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.0) 70%, rgba(0,0,0,0.6) 100%);
      z-index: -1;
      pointer-events: none;
    }

    /* === Screens === */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
      transform: translateY(8px);
    }
    .screen.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    /* === Splash === */
    #splash {
      padding: calc(var(--safe-top) + 24px) 24px calc(var(--safe-bottom) + 32px);
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
    }
    .splash-logo {
      font-size: 84px;
      line-height: 1;
      margin-bottom: 18px;
      filter: drop-shadow(0 8px 30px rgba(255,255,255,0.15));
    }
    #splash h1 {
      font-size: 32px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.03em;
    }
    #splash .subtitle {
      font-size: 16px;
      color: var(--text-2);
      margin: 8px 0 56px;
      font-weight: 400;
    }

    .primary-btn {
      width: 100%;
      max-width: 420px;
      padding: 18px 24px;
      border-radius: 16px;
      background: var(--text);
      color: #000;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      box-shadow: 0 12px 40px rgba(255,255,255,0.18);
      min-height: 56px;
    }
    .resume-hint {
      margin: 18px 0 0;
      font-size: 13px;
      color: var(--text-3);
    }
    .resume-hint a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    /* === Player === */
    #player-screen {
      padding: calc(var(--safe-top) + 8px) 20px calc(var(--safe-bottom) + 24px);
      gap: 0;
    }

    .player-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 100px;
      margin-bottom: 28px;
    }
    .close-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface-strong);
      font-size: 14px;
      color: var(--text-2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-info {
      flex: 1;
      text-align: center;
      padding: 0 12px;
    }
    .header-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 0;
    }

    .artwork-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      min-height: 0;
    }
    .artwork {
      width: min(86vw, 380px);
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      overflow: hidden;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.55),
        0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
      position: relative;
      background: #111;
      transition: transform 0.6s var(--ease);
    }
    .artwork.playing { transform: scale(1); }
    .artwork.paused { transform: scale(0.92); }
    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #player iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .artwork-fallback {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      pointer-events: none;
    }

    .track-info {
      text-align: center;
      padding: 28px 8px 24px;
    }
    .track-info h2 {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }
    .track-info .track-index {
      font-size: 13px;
      color: var(--text-3);
      margin: 6px 0 0;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 8px 0 20px;
    }
    .ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }
    .ctrl-btn.side {
      width: 64px;
      height: 64px;
    }
    .ctrl-btn.side svg {
      width: 36px;
      height: 36px;
    }
    .ctrl-btn.primary {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: var(--text);
      color: #000;
      box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
    }
    .ctrl-btn.primary svg {
      width: 36px;
      height: 36px;
    }

    .up-next {
      padding: 14px 18px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .up-next-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .up-next-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin: 0;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .up-next-icon {
      color: var(--text-3);
      flex-shrink: 0;
    }

    /* === Header actions (shuffle / list) === */
    .header-actions {
      display: flex;
      gap: 6px;
    }
    .header-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface-strong);
      color: var(--text-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .header-btn.active {
      color: var(--accent);
      background: rgba(10, 132, 255, 0.18);
    }
    .header-btn svg { width: 18px; height: 18px; }

    /* === Progress bar === */
    .progress-wrap {
      padding: 0 4px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 100px;
      position: relative;
      cursor: pointer;
      touch-action: none;
      transition: height 0.2s var(--ease);
    }
    .progress-bar:active { height: 6px; }
    .progress-fill {
      height: 100%;
      background: var(--text);
      border-radius: 100px;
      width: 0;
      transition: width 0.18s linear;
      pointer-events: none;
    }
    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    /* === Seek (±10s) buttons === */
    .ctrl-btn.seek {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--surface);
      border: 0.5px solid var(--hairline);
      position: relative;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl-btn.seek svg { width: 28px; height: 28px; }
    .seek-num {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, calc(-50% + 1px));
      font-size: 10px;
      font-weight: 700;
      letter-spacing: -0.02em;
      pointer-events: none;
    }

    /* === Story list sheet === */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s var(--ease);
      z-index: 40;
    }
    .sheet-backdrop.open { opacity: 1; pointer-events: auto; }

    .sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      max-height: 82vh;
      background: rgba(20, 20, 22, 0.92);
      backdrop-filter: blur(50px) saturate(180%);
      -webkit-backdrop-filter: blur(50px) saturate(180%);
      border-top: 0.5px solid var(--hairline);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      transform: translateY(100%);
      transition: transform 0.45s var(--ease);
      z-index: 50;
      padding: 10px 0 calc(var(--safe-bottom) + 12px);
      display: flex;
      flex-direction: column;
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 38px;
      height: 5px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 100px;
      margin: 4px auto 10px;
      flex-shrink: 0;
    }
    .sheet-title {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    .sheet-list {
      overflow-y: auto;
      padding: 0 16px 8px;
      flex: 1;
      -webkit-overflow-scrolling: touch;
    }
    .sheet-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 4px;
      border-bottom: 0.5px solid var(--hairline);
      width: 100%;
      text-align: left;
      color: var(--text);
    }
    .sheet-item:last-child { border-bottom: none; }
    .sheet-thumb {
      width: 52px; height: 52px;
      border-radius: 8px;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
      background-color: #222;
    }
    .sheet-info {
      flex: 1;
      min-width: 0;
    }
    .sheet-name {
      font-size: 15px;
      font-weight: 500;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }
    .sheet-meta {
      font-size: 12px;
      color: var(--text-3);
      margin: 3px 0 0;
      font-variant-numeric: tabular-nums;
    }
    .sheet-item.current .sheet-name { color: var(--accent); }
    .sheet-item.current .sheet-meta { color: rgba(10, 132, 255, 0.7); }
    .sheet-bars {
      display: inline-flex;
      gap: 2px;
      align-items: flex-end;
      height: 10px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .sheet-bars span {
      display: block;
      width: 2px;
      background: var(--accent);
      border-radius: 1px;
      animation: bars 1s ease-in-out infinite;
    }
    .sheet-bars span:nth-child(1) { height: 60%; animation-delay: 0s; }
    .sheet-bars span:nth-child(2) { height: 100%; animation-delay: 0.2s; }
    .sheet-bars span:nth-child(3) { height: 70%; animation-delay: 0.4s; }
    @keyframes bars {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.4); }
    }

    /* === Toast === */
    .toast {
      position: fixed;
      top: calc(var(--safe-top) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(-120%);
      padding: 12px 20px;
      background: rgba(20, 20, 22, 0.85);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 0.5px solid var(--hairline);
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      z-index: 100;
      transition: transform 0.5s var(--ease);
      pointer-events: none;
      max-width: 90vw;
      white-space: nowrap;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* === Loading shimmer === */
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
    .loading { animation: pulse 1.6s ease-in-out infinite; }

    /* Small phones */
    @media (max-height: 700px) {
      .artwork { width: min(64vw, 240px); }
      .track-info { padding: 14px 8px 10px; }
      .track-info h2 { font-size: 19px; }
      .controls { gap: 10px; padding: 4px 0 12px; }
      .ctrl-btn.primary { width: 68px; height: 68px; }
      .ctrl-btn.side { width: 50px; height: 50px; }
      .ctrl-btn.seek { width: 44px; height: 44px; }
      .ctrl-btn.seek svg { width: 24px; height: 24px; }
      .progress-wrap { padding: 0 4px 8px; }
    }
  </style>
</head>
<body>
  <div class="bg-blur" id="bg-blur"></div>
  <div class="bg-vignette"></div>

  <!-- ========================================= -->
  <!-- Splash -->
  <!-- ========================================= -->
  <section id="splash" class="screen active">
    <div class="splash-logo">🌙</div>
    <h1>세담이의 동화 극장</h1>
    <p class="subtitle">자장가처럼 들려주는 29편의 동화</p>

    <button id="start-btn" class="primary-btn">▶  동화 시작</button>
    <p class="resume-hint" id="resume-hint" hidden></p>
  </section>

  <!-- ========================================= -->
  <!-- Player -->
  <!-- ========================================= -->
  <section id="player-screen" class="screen">
    <header class="player-header glass">
      <button class="close-btn" id="close-btn" aria-label="닫기">✕</button>
      <div class="header-info">
        <p class="header-label">Now Playing</p>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="shuffle-btn" aria-label="셔플">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.6 14.6L8.5 16.7c-.7.7-1.7 1.1-2.7 1.1H3v-2h2.8c.5 0 1-.2 1.4-.6l2-2 1.4 1.4zM3 6v2h2.8c.5 0 1 .2 1.4.6l11.4 11.4c.4.4.9.6 1.4.6H21v3l3-3-3-3v3h-1c-.5 0-1-.2-1.4-.6L8.6 7.6C7.9 6.9 6.9 6.5 5.9 6.5H3zm17 0v3l3-3-3-3v3h-1c-1 0-2 .4-2.7 1.1l-2.1 2.1 1.4 1.4 2.1-2c.4-.4.9-.6 1.4-.6H20z"/></svg>
        </button>
        <button class="header-btn" id="list-btn" aria-label="목록">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        </button>
      </div>
    </header>

    <div class="artwork-wrap">
      <div class="artwork paused" id="artwork">
        <div class="artwork-fallback" id="artwork-fallback"></div>
        <div id="player"></div>
      </div>
    </div>

    <div class="track-info">
      <h2 id="current-title" class="loading">불러오는 중…</h2>
      <p class="track-index" id="track-index"></p>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-times">
        <span id="time-current">0:00</span>
        <span id="time-duration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn seek" id="seek-back-btn" aria-label="10초 뒤로">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 9 8 9"/></svg>
        <span class="seek-num">10</span>
      </button>
      <button class="ctrl-btn side" id="prev-btn" aria-label="이전">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM9.5 12l8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn primary" id="play-btn" aria-label="재생/일시정지">
        <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn side" id="next-btn" aria-label="다음">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
      </button>
      <button class="ctrl-btn seek" id="seek-fwd-btn" aria-label="10초 앞으로">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 4 21 9 16 9"/></svg>
        <span class="seek-num">10</span>
      </button>
    </div>

    <div class="up-next glass">
      <span class="up-next-label">Up Next</span>
      <p class="up-next-title" id="next-title">—</p>
      <svg class="up-next-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 6l6 6-6 6V6z"/></svg>
    </div>
  </section>

  <!-- Story list sheet -->
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <aside class="sheet" id="list-sheet" aria-hidden="true">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title">동화 목록</h3>
    <div class="sheet-list" id="sheet-list"></div>
  </aside>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ============================================
    // Playlist
    // ============================================
    // 라푼젤은 단일 영상이 아닌 플레이리스트라 v1 제외.
    // 인어공주는 백설공주와 동일 ID로 들어와 있어 v1 제외 (원본 URL 확인 필요).
    const PLAYLIST = [
      { id: "N88M1EAnG2c", title: "신데렐라" },
      { id: "Im_Dcx4_3qQ", title: "백설공주" },
      { id: "2CZyJQ9AfHQ", title: "잠자는 숲속의 공주" },
      { id: "2EHBNQQ_v-o", title: "미녀와 야수" },
      { id: "U4gTl2m8Ih4", title: "엄지공주" },
      { id: "HEag7XVZvXg", title: "선화공주" },
      { id: "btsYiJoNV-k", title: "양치기 소년" },
      { id: "ZNu5CBp1_0U", title: "봄해님과 겨울바람" },
      { id: "75Xa41xBfLI", title: "은혜 갚은 생쥐" },
      { id: "aKijuAPV3Og", title: "피터팬" },
      { id: "8_iNVlPui-8", title: "알라딘과 요술램프" },
      { id: "Ql8PfongcSA", title: "스크루지 크리스마스 캐럴" },

      { id: "2sEjhLNHQcY", title: "두 마리 염소" },

      { id: "elplR7TzD64", title: "제우스와 거북이" },
      { id: "c0ZAPSxTzqI", title: "소가 된 게으름뱅이" },
      { id: "goD1u6_PvFs", title: "포도밭에 숨긴 보물" }

    // ============================================
    // State
    // ============================================
    const STORAGE_KEY = "sedam.state.v1";
    const STATS_KEY = "sedam.stats.v1";
    const RESUME_MIN_SEC = 5;        // 5초 미만 진행 시 처음부터
    const RESUME_TAIL_SEC = 10;      // 끝 10초 내면 처음부터
    const RESUME_SAVE_EVERY_MS = 4000;

    const state = {
      currentIdx: 0,
      isPlaying: false,
      errorSkipTimeoutId: null,
      apiReady: false,
      pendingStart: false,
      shuffle: false,
      shuffleQueue: [],
      shuffleQueueIdx: 0,
      duration: 0,
      progressIntervalId: null,
      lastResumeSaveAt: 0,
      shouldResume: false,
      countedThisVideo: false,
      isScrubbing: false
    };

    const stats = {
      playCounts: {},   // { videoId: count }
      lastPosition: {}  // { videoId: seconds }
    };

    let player = null;

    // ============================================
    // DOM refs
    // ============================================
    const $ = (id) => document.getElementById(id);
    const splash = $("splash");
    const playerScreen = $("player-screen");
    const startBtn = $("start-btn");
    const closeBtn = $("close-btn");
    const playBtn = $("play-btn");
    const playIcon = $("play-icon");
    const prevBtn = $("prev-btn");
    const nextBtn = $("next-btn");
    const currentTitleEl = $("current-title");
    const trackIndexEl = $("track-index");
    const nextTitleEl = $("next-title");
    const bgBlur = $("bg-blur");
    const artwork = $("artwork");
    const artworkFallback = $("artwork-fallback");
    const toastEl = $("toast");
    const resumeHint = $("resume-hint");
    const seekBackBtn = $("seek-back-btn");
    const seekFwdBtn = $("seek-fwd-btn");
    const shuffleBtn = $("shuffle-btn");
    const listBtn = $("list-btn");
    const progressBar = $("progress-bar");
    const progressFill = $("progress-fill");
    const timeCurrentEl = $("time-current");
    const timeDurationEl = $("time-duration");
    const listSheet = $("list-sheet");
    const sheetBackdrop = $("sheet-backdrop");
    const sheetList = $("sheet-list");

    // ============================================
    // Helpers
    // ============================================
    function thumbUrl(id) {
      return `https://i.ytimg.com/vi/${id}/maxresdefault.jpg`;
    }

    function showToast(msg, ms = 2400) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.classList.remove("show"), ms);
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          idx: state.currentIdx,
          shuffle: state.shuffle
        }));
      } catch (e) {}
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (e) { return null; }
    }

    function saveStats() {
      try {
        localStorage.setItem(STATS_KEY, JSON.stringify(stats));
      } catch (e) {}
    }

    function loadStats() {
      try {
        const raw = localStorage.getItem(STATS_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed.playCounts) Object.assign(stats.playCounts, parsed.playCounts);
        if (parsed.lastPosition) Object.assign(stats.lastPosition, parsed.lastPosition);
      } catch (e) {}
    }

    function fmtTime(sec) {
      if (!isFinite(sec) || sec < 0) return "0:00";
      const s = Math.floor(sec);
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${m}:${String(r).padStart(2, "0")}`;
    }

    function setArtwork(id) {
      const url = thumbUrl(id);
      artworkFallback.style.backgroundImage = `url('${url}')`;
      bgBlur.style.backgroundImage = `url('${url}')`;
      bgBlur.classList.add("visible");
    }

    // ============================================
    // Progress + Seek
    // ============================================
    function startProgressLoop() {
      stopProgressLoop();
      state.progressIntervalId = setInterval(tickProgress, 500);
    }
    function stopProgressLoop() {
      clearInterval(state.progressIntervalId);
      state.progressIntervalId = null;
    }
    function tickProgress() {
      if (!player || state.isScrubbing) return;
      try {
        const t = player.getCurrentTime() || 0;
        const d = player.getDuration() || 0;
        if (d > 0) {
          state.duration = d;
          progressFill.style.width = `${Math.min(100, (t / d) * 100)}%`;
          timeCurrentEl.textContent = fmtTime(t);
          timeDurationEl.textContent = fmtTime(d);

          // Persist resume position throttled
          const now = Date.now();
          if (now - state.lastResumeSaveAt > RESUME_SAVE_EVERY_MS && t > RESUME_MIN_SEC) {
            state.lastResumeSaveAt = now;
            const id = PLAYLIST[state.currentIdx].id;
            stats.lastPosition[id] = Math.floor(t);
            saveStats();
          }
        }
      } catch (e) {}
    }

    function seekBy(deltaSec) {
      if (!player) return;
      try {
        const t = player.getCurrentTime() || 0;
        const d = player.getDuration() || 0;
        const newT = Math.max(0, Math.min(d - 0.5, t + deltaSec));
        player.seekTo(newT, true);
        // Update UI immediately
        if (d > 0) {
          progressFill.style.width = `${Math.min(100, (newT / d) * 100)}%`;
          timeCurrentEl.textContent = fmtTime(newT);
        }
      } catch (e) {}
    }

    function seekToRatio(ratio) {
      if (!player || !state.duration) return;
      const r = Math.max(0, Math.min(1, ratio));
      const newT = state.duration * r;
      try {
        player.seekTo(newT, true);
        progressFill.style.width = `${r * 100}%`;
        timeCurrentEl.textContent = fmtTime(newT);
      } catch (e) {}
    }

    function getRatioFromEvent(e) {
      const rect = progressBar.getBoundingClientRect();
      const x = (e.touches && e.touches[0] ? e.touches[0].clientX
                : e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX
                : e.clientX);
      return (x - rect.left) / rect.width;
    }

    // ============================================
    // Stats (play count + resume)
    // ============================================
    function incrementPlayCount() {
      if (state.countedThisVideo) return;
      state.countedThisVideo = true;
      const id = PLAYLIST[state.currentIdx].id;
      stats.playCounts[id] = (stats.playCounts[id] || 0) + 1;
      saveStats();
    }

    function maybeResume() {
      if (!state.shouldResume) return;
      state.shouldResume = false;
      const id = PLAYLIST[state.currentIdx].id;
      const savedT = stats.lastPosition[id];
      if (!savedT || savedT < RESUME_MIN_SEC) return;
      try {
        const d = player.getDuration() || 0;
        if (d > 0 && savedT < d - RESUME_TAIL_SEC) {
          player.seekTo(savedT, true);
          showToast(`${fmtTime(savedT)}부터 이어듣기`);
        }
      } catch (e) {}
    }

    function clearResume(id) {
      if (stats.lastPosition[id] != null) {
        delete stats.lastPosition[id];
        saveStats();
      }
    }

    // ============================================
    // Shuffle
    // ============================================
    function generateShuffleQueue(startIdx) {
      const rest = [];
      for (let i = 0; i < PLAYLIST.length; i++) if (i !== startIdx) rest.push(i);
      for (let i = rest.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [rest[i], rest[j]] = [rest[j], rest[i]];
      }
      return [startIdx, ...rest];
    }

    function setShuffle(on) {
      state.shuffle = !!on;
      if (state.shuffle) {
        state.shuffleQueue = generateShuffleQueue(state.currentIdx);
        state.shuffleQueueIdx = 0;
      }
      shuffleBtn.classList.toggle("active", state.shuffle);
      saveState();
    }

    function toggleShuffle() {
      setShuffle(!state.shuffle);
      showToast(state.shuffle ? "셔플 켬 🎲" : "셔플 끔");
    }

    // ============================================
    // Story list sheet
    // ============================================
    function renderList() {
      sheetList.innerHTML = "";
      const frag = document.createDocumentFragment();
      PLAYLIST.forEach((item, idx) => {
        const count = stats.playCounts[item.id] || 0;
        const lastT = stats.lastPosition[item.id] || 0;
        const isCurrent = idx === state.currentIdx;
        const btn = document.createElement("button");
        btn.className = "sheet-item" + (isCurrent ? " current" : "");
        const meta = count > 0
          ? `${count}번 재생${lastT > RESUME_MIN_SEC ? ` · ${fmtTime(lastT)}부터` : ""}`
          : "미재생";
        const bars = isCurrent && state.isPlaying
          ? '<span class="sheet-bars"><span></span><span></span><span></span></span>'
          : "";
        btn.innerHTML = `
          <div class="sheet-thumb" style="background-image:url('${thumbUrl(item.id)}')"></div>
          <div class="sheet-info">
            <p class="sheet-name">${item.title}${bars}</p>
            <p class="sheet-meta">${meta}</p>
          </div>
        `;
        btn.addEventListener("click", () => {
          if (navigator.vibrate) navigator.vibrate(8);
          if (state.shuffle) {
            // Regenerate queue starting at picked idx
            state.shuffleQueue = generateShuffleQueue(idx);
            state.shuffleQueueIdx = 0;
          }
          loadIndex(idx, true);
          closeSheet();
        });
        frag.appendChild(btn);
      });
      sheetList.appendChild(frag);
    }

    function openSheet() {
      renderList();
      listSheet.classList.add("open");
      sheetBackdrop.classList.add("open");
      listSheet.setAttribute("aria-hidden", "false");
      setTimeout(() => {
        const cur = sheetList.querySelector(".sheet-item.current");
        if (cur) cur.scrollIntoView({ block: "center", behavior: "instant" });
      }, 50);
    }

    function closeSheet() {
      listSheet.classList.remove("open");
      sheetBackdrop.classList.remove("open");
      listSheet.setAttribute("aria-hidden", "true");
    }

    function updateMediaSession() {
      if (!("mediaSession" in navigator)) return;
      const cur = PLAYLIST[state.currentIdx];
      try {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: cur.title,
          artist: "세담이의 동화 극장",
          album: `${state.currentIdx + 1} / ${PLAYLIST.length}`,
          artwork: [
            { src: thumbUrl(cur.id), sizes: "512x512", type: "image/jpeg" }
          ]
        });
        navigator.mediaSession.setActionHandler("previoustrack", () => playPrev());
        navigator.mediaSession.setActionHandler("nexttrack", () => playNext());
        navigator.mediaSession.setActionHandler("play", () => { try { player && player.playVideo(); } catch (e) {} });
        navigator.mediaSession.setActionHandler("pause", () => { try { player && player.pauseVideo(); } catch (e) {} });
      } catch (e) {}
    }

    function setPlayingVisual(playing) {
      state.isPlaying = playing;
      artwork.classList.toggle("playing", playing);
      artwork.classList.toggle("paused", !playing);
      playIcon.innerHTML = playing
        ? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'
        : '<path d="M8 5v14l11-7z"/>';
    }

    // ============================================
    // Splash interactions
    // ============================================
    startBtn.addEventListener("click", () => {
      if (navigator.vibrate) navigator.vibrate(8);
      startSession();
    });

    closeBtn.addEventListener("click", () => {
      if (navigator.vibrate) navigator.vibrate(8);
      endSession();
    });

    // Bootstrap from storage
    (function bootstrap() {
      loadStats();
      const saved = loadState();
      if (saved) {
        if (saved.shuffle) setShuffle(true);
        if (saved.idx > 0 && saved.idx < PLAYLIST.length) {
          const t = PLAYLIST[saved.idx].title;
          resumeHint.innerHTML = `이어보기: <a href="#" id="resume-link">${t}</a>`;
          resumeHint.hidden = false;
          $("resume-link").addEventListener("click", (e) => {
            e.preventDefault();
            state.currentIdx = saved.idx;
            startSession();
          });
        }
      }
    })();

    // Install hint (only when not yet installed as PWA)
    (function showInstallHint() {
      const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;
      if (isStandalone) return;
      const isIOS = /iP(hone|od|ad)/.test(navigator.platform) ||
        (/Mac/.test(navigator.platform) && navigator.maxTouchPoints > 1);
      const hint = document.createElement("p");
      hint.className = "resume-hint";
      hint.style.marginTop = "10px";
      hint.style.opacity = "0.7";
      hint.textContent = isIOS
        ? "💡 공유 → '홈 화면에 추가'로 풀스크린 실행"
        : "💡 브라우저 메뉴에서 '홈 화면에 설치'하면 풀스크린 실행";
      splash.appendChild(hint);
    })();

    // ============================================
    // YouTube IFrame API
    // ============================================
    window.onYouTubeIframeAPIReady = function () {
      state.apiReady = true;
      if (state.pendingStart) {
        state.pendingStart = false;
        actuallyStart();
      }
    };

    (function loadYTApi() {
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
    })();

    function actuallyStart() {
      const item = PLAYLIST[state.currentIdx];
      state.countedThisVideo = false;
      state.shouldResume = true;
      setArtwork(item.id);
      updateTitles();

      player = new YT.Player("player", {
        videoId: item.id,
        host: "https://www.youtube-nocookie.com",
        playerVars: {
          autoplay: 1,
          controls: 0,
          disablekb: 1,
          modestbranding: 1,
          rel: 0,
          iv_load_policy: 3,
          fs: 0,
          playsinline: 1,
          origin: location.origin || ""
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange,
          onError: onPlayerError
        }
      });
    }

    function onPlayerReady() {
      try { player.setVolume(100); } catch (e) {}
      try { player.playVideo(); } catch (e) {}
      requestWakeLock();
    }

    function onPlayerStateChange(e) {
      const S = YT.PlayerState;
      if (e.data === S.PLAYING) {
        setPlayingVisual(true);
        incrementPlayCount();
        maybeResume();
        startProgressLoop();
      } else if (e.data === S.PAUSED) {
        setPlayingVisual(false);
        stopProgressLoop();
      } else if (e.data === S.ENDED) {
        stopProgressLoop();
        clearResume(PLAYLIST[state.currentIdx].id);
        playNext(true);
      } else if (e.data === S.BUFFERING) {
        // try resume on first buffer in case PLAYING fires after seek
        maybeResume();
      }
    }

    function onPlayerError(e) {
      // 2: invalid id, 5: html5 error, 100: removed/private, 101/150: embed disabled
      console.warn("YT error", e.data);
      showToast("이 동화는 잠시 후 다시 시도해요…");
      clearTimeout(state.errorSkipTimeoutId);
      state.errorSkipTimeoutId = setTimeout(() => playNext(true), 3000);
    }

    // ============================================
    // Session / Playback
    // ============================================
    function startSession() {
      // First user gesture context — autoplay allowed from here
      splash.classList.remove("active");
      playerScreen.classList.add("active");

      if (!state.apiReady) {
        state.pendingStart = true;
      } else {
        actuallyStart();
      }

      saveState();
    }

    function endSession() {
      stopProgressLoop();
      try { player && player.stopVideo(); } catch (e) {}
      try { player && player.destroy(); } catch (e) {}
      player = null;
      releaseWakeLock();
      setPlayingVisual(false);
      playerScreen.classList.remove("active");
      splash.classList.add("active");
      bgBlur.classList.remove("visible");
      closeSheet();
    }

    function loadIndex(idx, autoplay = true) {
      if (idx < 0 || idx >= PLAYLIST.length) return;
      state.currentIdx = idx;
      state.countedThisVideo = false;
      state.shouldResume = true;
      state.duration = 0;
      progressFill.style.width = "0%";
      timeCurrentEl.textContent = "0:00";
      timeDurationEl.textContent = "0:00";
      const item = PLAYLIST[idx];
      setArtwork(item.id);
      updateTitles();
      saveState();
      if (player && typeof player.loadVideoById === "function") {
        try {
          if (autoplay) player.loadVideoById(item.id);
          else player.cueVideoById(item.id);
        } catch (e) {}
      }
    }

    function playNext(auto = false) {
      if (state.shuffle) {
        state.shuffleQueueIdx++;
        if (state.shuffleQueueIdx >= state.shuffleQueue.length) {
          // exhausted — reshuffle and continue
          state.shuffleQueue = generateShuffleQueue(state.currentIdx);
          state.shuffleQueueIdx = 1; // skip current
          showToast("모든 동화를 다 들었어요. 다시 섞어요 🎲");
        }
        const nextIdx = state.shuffleQueue[state.shuffleQueueIdx];
        loadIndex(nextIdx, true);
        return;
      }
      const next = state.currentIdx + 1;
      if (next >= PLAYLIST.length) {
        showToast("마지막 동화까지 끝났어요 💤");
        state.currentIdx = 0;
        saveState();
        endSession();
        return;
      }
      loadIndex(next, true);
    }

    function playPrev() {
      // Spotify-style: if >3s into track, restart; else go back
      try {
        const t = player ? (player.getCurrentTime() || 0) : 0;
        if (t > 3) {
          player.seekTo(0, true);
          return;
        }
      } catch (e) {}
      if (state.shuffle) {
        if (state.shuffleQueueIdx > 0) {
          state.shuffleQueueIdx--;
          loadIndex(state.shuffleQueue[state.shuffleQueueIdx], true);
        } else {
          try { player && player.seekTo(0, true); } catch (e) {}
        }
        return;
      }
      const prev = state.currentIdx - 1;
      if (prev < 0) {
        try { player && player.seekTo(0, true); } catch (e) {}
        return;
      }
      loadIndex(prev, true);
    }

    function togglePlay() {
      if (!player) return;
      try {
        const s = player.getPlayerState();
        if (s === YT.PlayerState.PLAYING) player.pauseVideo();
        else player.playVideo();
      } catch (e) {}
    }

    function updateTitles() {
      const cur = PLAYLIST[state.currentIdx];
      currentTitleEl.textContent = cur.title;
      currentTitleEl.classList.remove("loading");
      const count = stats.playCounts[cur.id] || 0;
      const countLabel = count > 0 ? ` · ${count}번째` : "";
      trackIndexEl.textContent = `${state.currentIdx + 1} / ${PLAYLIST.length}${countLabel}`;

      // Up Next
      let nxt;
      if (state.shuffle) {
        const nextQueueIdx = state.shuffleQueueIdx + 1;
        nxt = nextQueueIdx < state.shuffleQueue.length
          ? PLAYLIST[state.shuffleQueue[nextQueueIdx]]
          : null;
      } else {
        nxt = PLAYLIST[state.currentIdx + 1];
      }
      nextTitleEl.textContent = nxt ? nxt.title : "마지막 동화예요";
      updateMediaSession();
    }

    // ============================================
    // Wake Lock
    // ============================================
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
          wakeLock.addEventListener("release", () => { wakeLock = null; });
        }
      } catch (e) {}
    }
    function releaseWakeLock() {
      try { wakeLock && wakeLock.release(); } catch (e) {}
      wakeLock = null;
    }
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && state.isPlaying && !wakeLock) {
        requestWakeLock();
      }
    });

    // ============================================
    // Buttons + swipe
    // ============================================
    playBtn.addEventListener("click", () => {
      if (navigator.vibrate) navigator.vibrate(8);
      togglePlay();
    });
    prevBtn.addEventListener("click", () => {
      if (navigator.vibrate) navigator.vibrate(8);
      playPrev();
    });
    nextBtn.addEventListener("click", () => {
      if (navigator.vibrate) navigator.vibrate(8);
      playNext();
    });
    seekBackBtn.addEventListener("click", () => {
      if (navigator.vibrate) navigator.vibrate(6);
      seekBy(-10);
    });
    seekFwdBtn.addEventListener("click", () => {
      if (navigator.vibrate) navigator.vibrate(6);
      seekBy(10);
    });
    shuffleBtn.addEventListener("click", () => {
      if (navigator.vibrate) navigator.vibrate(8);
      toggleShuffle();
      updateTitles(); // refresh Up Next
    });
    listBtn.addEventListener("click", () => {
      if (navigator.vibrate) navigator.vibrate(8);
      openSheet();
    });
    sheetBackdrop.addEventListener("click", closeSheet);

    // Drag handle on sheet — swipe down to close
    let sheetTouchStartY = 0;
    listSheet.addEventListener("touchstart", (e) => {
      // only start drag if touch is on handle area (top 40px)
      const rect = listSheet.getBoundingClientRect();
      if (e.touches[0].clientY - rect.top > 40) return;
      sheetTouchStartY = e.touches[0].clientY;
    }, { passive: true });
    listSheet.addEventListener("touchend", (e) => {
      if (!sheetTouchStartY) return;
      const dy = e.changedTouches[0].clientY - sheetTouchStartY;
      sheetTouchStartY = 0;
      if (dy > 60) closeSheet();
    }, { passive: true });

    // Progress bar tap-to-seek + drag-to-scrub
    function onProgressDown(e) {
      state.isScrubbing = true;
      seekToRatio(getRatioFromEvent(e));
    }
    function onProgressMove(e) {
      if (!state.isScrubbing) return;
      e.preventDefault();
      seekToRatio(getRatioFromEvent(e));
    }
    function onProgressUp() {
      if (!state.isScrubbing) return;
      state.isScrubbing = false;
    }
    progressBar.addEventListener("touchstart", onProgressDown, { passive: true });
    progressBar.addEventListener("touchmove", onProgressMove, { passive: false });
    progressBar.addEventListener("touchend", onProgressUp);
    progressBar.addEventListener("mousedown", (e) => { onProgressDown(e); document.addEventListener("mousemove", onProgressMove); document.addEventListener("mouseup", () => { onProgressUp(); document.removeEventListener("mousemove", onProgressMove); }, { once: true }); });

    // Swipe on artwork
    let touchStartX = 0, touchStartY = 0, touchStartT = 0;
    artwork.addEventListener("touchstart", (e) => {
      const t = e.changedTouches[0];
      touchStartX = t.screenX;
      touchStartY = t.screenY;
      touchStartT = Date.now();
    }, { passive: true });
    artwork.addEventListener("touchend", (e) => {
      const t = e.changedTouches[0];
      const dx = t.screenX - touchStartX;
      const dy = t.screenY - touchStartY;
      const dt = Date.now() - touchStartT;
      if (dt > 600) return;
      if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
      if (navigator.vibrate) navigator.vibrate(8);
      if (dx < 0) playNext(); else playPrev();
    }, { passive: true });

    // Prevent double-tap zoom on iOS
    let lastTap = 0;
    document.addEventListener("touchend", (e) => {
      const now = Date.now();
      if (now - lastTap < 350) e.preventDefault();
      lastTap = now;
    }, { passive: false });
  </script>
</body>
</html>
